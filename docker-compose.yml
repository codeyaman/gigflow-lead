version: '3.8'

services:
  mongodb:
    image: mongo:6.0-jammy
    container_name: gigflow-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - gigflow-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gigflow-backend
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - MONGO_URI=mongodb://mongodb:27017/smart-leads
      - JWT_SECRET=super_secret_key_12345
      - CLIENT_URL=http://localhost:5173
    depends_on:
      - mongodb
    networks:
      - gigflow-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5001/api
    container_name: gigflow-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - gigflow-network

volumes:
  mongo-data:

networks:
  gigflow-network:
    driver: bridge
